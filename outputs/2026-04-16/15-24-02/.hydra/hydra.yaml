hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - run_name=rl_grpo_interactive_dual_vllm_fix_0416_152356
    - model.path=/home/atuin/c107fa/c107fa12/synthetic-RLVL/runs/sft_lr_lr1e-4_seed3407/final
    - grpo.train_steps=50
    - grpo.num_prompts=8
    - grpo.num_rollouts=8
    - validation.before_train=true
    - validation.eval_every=40
    - validation.save_every=40
    - eval.enabled=true
    - eval.external_enabled=false
    - eval.constrained_enabled=false
    - eval.synthetic_samples_per_step=20
    - eval.max_new_tokens=1024
    - eval.generation_backend=vllm
    - eval.generation_batch_size=1024
    - eval.vllm_gpu_memory_utilization=0.5
    - log_generations.num_samples=8
    - log_generations.train_every=20
    - log_generations.train_num_samples=6
    - log_generations.train_max_chars=1600
    - log_generations.train_dump_jsonl=false
  job:
    name: posttrain_grpo_verl
    chdir: null
    override_dirname: eval.constrained_enabled=false,eval.enabled=true,eval.external_enabled=false,eval.generation_backend=vllm,eval.generation_batch_size=1024,eval.max_new_tokens=1024,eval.synthetic_samples_per_step=20,eval.vllm_gpu_memory_utilization=0.5,grpo.num_prompts=8,grpo.num_rollouts=8,grpo.train_steps=50,log_generations.num_samples=8,log_generations.train_dump_jsonl=false,log_generations.train_every=20,log_generations.train_max_chars=1600,log_generations.train_num_samples=6,model.path=/home/atuin/c107fa/c107fa12/synthetic-RLVL/runs/sft_lr_lr1e-4_seed3407/final,run_name=rl_grpo_interactive_dual_vllm_fix_0416_152356,validation.before_train=true,validation.eval_every=40,validation.save_every=40
    id: ???
    num: ???
