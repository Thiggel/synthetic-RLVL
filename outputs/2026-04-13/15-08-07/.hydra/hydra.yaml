hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - run_name=rl_grpo_base_smoke_3537279
    - seed=3407
    - allow_base_model=true
    - model.path=allenai/Olmo-3-1025-7B
    - task.template=logic
    - task.prefill=none
    - reward.schema=correct_plus_valid_plus_0p1_format
    - data.train_samples=1024
    - data.val_samples=128
    - grpo.train_steps=120
    - grpo.num_prompts=8
    - grpo.num_rollouts=4
    - validation.before_train=true
    - validation.eval_every=40
    - validation.save_every=40
    - eval.enabled=false
    - log_generations.num_samples=4
    - log_generations.train_every=20
    - log_generations.train_num_samples=6
    - log_generations.train_max_chars=1600
    - log_generations.train_dump_jsonl=false
  job:
    name: posttrain_grpo_verl
    chdir: null
    override_dirname: allow_base_model=true,data.train_samples=1024,data.val_samples=128,eval.enabled=false,grpo.num_prompts=8,grpo.num_rollouts=4,grpo.train_steps=120,log_generations.num_samples=4,log_generations.train_dump_jsonl=false,log_generations.train_every=20,log_generations.train_max_chars=1600,log_generations.train_num_samples=6,model.path=allenai/Olmo-3-1025-7B,reward.schema=correct_plus_valid_plus_0p1_format,run_name=rl_grpo_base_smoke_3537279,seed=3407,task.prefill=none,task.template=logic,validation.before_train=true,validation.eval_every=40,validation.save_every=40
    id: ???
    num: ???
    config_name: posttrain_grpo
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/hpc/c107fa/c107fa12/synthetic-RLVL
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/hpc/c107fa/c107fa12/synthetic-RLVL/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/hpc/c107fa/c107fa12/synthetic-RLVL/outputs/2026-04-13/15-08-07
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
