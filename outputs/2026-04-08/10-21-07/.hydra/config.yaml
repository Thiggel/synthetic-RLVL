seed: 3407
run_name: test_sft_smoke
output_dir: /tmp/synthrlvl_sft_smoke
model:
  name: sshleifer/tiny-gpt2
  bf16: false
  lora:
    enabled: false
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - up_proj
    - down_proj
    - gate_proj
task:
  template: logic
  prefill: none
  distractor_ratio: 0.5
  train_min_step: 1
  train_max_step: 2
  val_min_step: 1
  val_max_step: 2
data:
  train_samples: 8
  eval_samples: 4
  max_length: 256
train:
  per_device_batch_size: 1
  per_device_eval_batch_size: 1
  grad_accum: 16
  lr: 3.0e-05
  max_steps: 1
  warmup_steps: 50
  logging_steps: 1
  eval_steps: 1
  save_steps: 1
  save_total_limit: 3
validation:
  eval_steps: 1
  step_min: 1
  step_max: 1
  samples_per_step: 2
  max_new_tokens: 32
external_eval:
  enabled: false
  benchmarks:
  - proofwriter
  - folio
  - prontoqa
  - proverqa
  - logiqa2
  - bbh
  - mmlu_philosophy
  - mmlu_formal_logic
  - strategyqa
  limit_per_benchmark: 20
  max_new_tokens: 256
constrained_eval:
  enabled: false
  samples_per_step: 4
  max_lines: 32
log_generations:
  num_samples: 8
  max_chars: 2000
logging:
  report_to: []
