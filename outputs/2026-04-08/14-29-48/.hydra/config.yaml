  synthetic_step_min: 1
  synthetic_step_max: 20
  synthetic_samples_per_step: 20
  max_new_tokens: 512
  external_enabled: true
  external_benchmarks:
  - proofwriter
  - folio
  - prontoqa
  - proverqa
  - logiqa2
  - bbh
  - mmlu_philosophy
  - mmlu_formal_logic
  - strategyqa
  external_limit_per_benchmark: 20
  constrained_enabled: false
  constrained_samples_per_step: 4
  constrained_max_lines: 32
logging:
