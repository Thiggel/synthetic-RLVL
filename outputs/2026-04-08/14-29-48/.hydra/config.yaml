seed: 3407
run_name: prod_pipeline_grpo_dummy_seed3407
output_dir: ${oc.env:WORK,${oc.env:HOME}}/synthetic-RLVL/runs
allow_base_model: true
model:
  path: allenai/Olmo-3-1025-7B
  lora_rank: 16
  lora_alpha: 16
task:
  template: logic
  prefill: none
  distractor_ratio: 0.5
  train_min_step: 1
  train_max_step: 10
