hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - run_name=prod_pipeline_sft_dummy_seed3407
    - seed=3407
    - model.name=allenai/Olmo-3-1025-7B
    - model.lora.enabled=true
    - model.lora.r=16
    - task.template=logic
    - task.prefill=none
    - task.distractor_ratio=0.5
    - task.train_min_step=1
    - task.train_max_step=5
    - task.val_min_step=1
    - task.val_max_step=10
    - train.max_steps=1000
    - train.eval_steps=100
    - train.save_steps=250
    - validation.eval_steps=500
    - validation.step_min=1
    - validation.step_max=20
    - validation.samples_per_step=20
    - external_eval.enabled=true
  job:
    name: train_sft
    chdir: null
    override_dirname: external_eval.enabled=true,model.lora.enabled=true,model.lora.r=16,model.name=allenai/Olmo-3-1025-7B,run_name=prod_pipeline_sft_dummy_seed3407,seed=3407,task.distractor_ratio=0.5,task.prefill=none,task.template=logic,task.train_max_step=5,task.train_min_step=1,task.val_max_step=10,task.val_min_step=1,train.eval_steps=100,train.max_steps=1000,train.save_steps=250,validation.eval_steps=500,validation.samples_per_step=20,validation.step_max=20,validation.step_min=1
    id: ???
    num: ???
    config_name: sft
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/hpc/c107fa/c107fa12/synthetic-RLVL
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/hpc/c107fa/c107fa12/synthetic-RLVL/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/hpc/c107fa/c107fa12/synthetic-RLVL/outputs/2026-04-08/13-26-54
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
