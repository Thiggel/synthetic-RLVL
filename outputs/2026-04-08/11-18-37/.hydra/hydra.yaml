hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - model.path=sshleifer/tiny-gpt2
    - allow_base_model=true
    - run_name=test_grpo_autonomous_tiny_e2e
    - output_dir=/tmp/synthrlvl_grpo_autonomous
    - data.train_samples=8
    - data.val_samples=4
    - grpo.train_steps=1
    - grpo.num_prompts=1
    - grpo.num_rollouts=1
    - grpo.max_prompt_length=128
    - grpo.max_response_length=64
    - grpo.max_num_batched_tokens=512
    - grpo.gpu_memory_utilization=0.2
    - validation.eval_every=1
    - validation.save_every=1
    - eval.enabled=true
    - eval.synthetic_step_min=1
    - eval.synthetic_step_max=2
    - eval.synthetic_samples_per_step=1
    - eval.external_enabled=false
    - eval.constrained_enabled=false
    - log_generations.num_samples=1
    - system.ray_cpus=12
  job:
    name: posttrain_grpo_verl
    chdir: null
    override_dirname: allow_base_model=true,data.train_samples=8,data.val_samples=4,eval.constrained_enabled=false,eval.enabled=true,eval.external_enabled=false,eval.synthetic_samples_per_step=1,eval.synthetic_step_max=2,eval.synthetic_step_min=1,grpo.gpu_memory_utilization=0.2,grpo.max_num_batched_tokens=512,grpo.max_prompt_length=128,grpo.max_response_length=64,grpo.num_prompts=1,grpo.num_rollouts=1,grpo.train_steps=1,log_generations.num_samples=1,model.path=sshleifer/tiny-gpt2,output_dir=/tmp/synthrlvl_grpo_autonomous,run_name=test_grpo_autonomous_tiny_e2e,system.ray_cpus=12,validation.eval_every=1,validation.save_every=1
    id: ???
    num: ???
    config_name: posttrain_grpo
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /home/hpc/c107fa/c107fa12/synthetic-RLVL
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /home/hpc/c107fa/c107fa12/synthetic-RLVL/conf
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /home/hpc/c107fa/c107fa12/synthetic-RLVL/outputs/2026-04-08/11-18-37
    choices:
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
