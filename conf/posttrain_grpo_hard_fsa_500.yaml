seed: 3407
run_name: rl_grpo_hard_fsa_500_base
output_dir: ${oc.env:WORK,${oc.env:HOME}}/synthetic-RLVL/runs
allow_base_model: false

model:
  path: ${oc.env:SFT_CHECKPOINT,null}
  lora_rank: 16
  lora_alpha: 16
  merge_adapter_for_rollout: false

task:
  template: logic
  prefill: none
  distractor_ratio: 0.5
  difficulty: hard_fsa
  branching_factor: 4
  decoy_chains: null
  near_miss_ratio: null
  side_chain_depth: null
  entity_decoy_ratio: null
  answer_decoy_ratio: null
  shortcut_rate: 0.0
  require_unique_solution: true
  train_min_step: 1
  train_max_step: 15
  val_min_step: 1
  val_max_step: 20

data:
  source: materialized
  train_samples: 30000
  val_samples: 512
  materialized:
    dataset_id: flaitenberger/LogicalReasoning-hard-fsa
    local_root: null
    train_subset: train_up_to_15_50k
    val_subset: auto

reward:
  schema: correct_plus_citation_free_valid_plus_0p1_format

grpo:
  train_steps: 500
  rollout_backend: vllm
  num_prompts: 8
  num_rollouts: 8
  max_prompt_length: 4096
  max_response_length: 1024
  max_model_len: null
  max_num_batched_tokens: 16384
  temperature: 1.0
  gpu_memory_utilization: 0.5

optim:
  lr: 1e-6
  weight_decay: 0.01
  warmup_steps: 0
  micro_batch_size: 4
  logprob_micro_batch_size: 4
  kl_coef: 0.0

validation:
  enabled: true
  before_train: true
  eval_every: 100
  save_every: 250
  max_actor_ckpt_to_keep: 2
  run_verl_validation: false

eval:
  enabled: true
  synthetic_step_min: 1
  synthetic_step_max: 20
  synthetic_samples_per_step: 10
  max_new_tokens: 1024
  generation_backend: vllm
  generation_batch_size: 1024
  vllm_gpu_memory_utilization: 0.5
  sampled_enabled: false
  sampled_num_generations: 64
  sampled_k_values: [1, 2, 4, 8, 16, 32, 64]
  sampled_temperature: 1.0
  external_enabled: false
  external_benchmarks: [proofwriter, folio, prontoqa, proverqa, logiqa2, bbh, mmlu_philosophy, mmlu_formal_logic, strategyqa]
  external_limit_per_benchmark: 20
  constrained_enabled: false
  constrained_samples_per_step: 4
  constrained_num_generations: 8
  constrained_candidates_per_line: 8
  constrained_k_values: [1, 2, 4, 8]
  constrained_max_lines: 32
  constrained_max_line_tokens: 48
  constrained_suffix_max_tokens: 256
  constrained_temperature: 1.0

logging:
  project: synthetic-rlvl
  entity: null

resume:
  mode: disable
  from_path: null

system:
  ray_cpus: 12
  reward_num_workers: 2

log_generations:
  num_samples: 8
  train_every: 50
  train_num_samples: 4
  train_max_chars: 2000
  train_dump_jsonl: false

debug:
  verl_sanity_only: false
  verl_sanity_prompt_path: null
  verl_sanity_max_new_tokens: 256
